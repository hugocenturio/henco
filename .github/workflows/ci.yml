name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.3']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl
          coverage: none
          tools: composer:v2

      - name: PHP syntax lint
        run: |
          ! find app config tests bootstrap.php index.php -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l 2>&1 | grep -v 'No syntax errors'

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dev dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: PHPUnit
        run: vendor/bin/phpunit --colors=always
